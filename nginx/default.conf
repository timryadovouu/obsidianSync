server {
    # configure to your needs
    listen 443 ssl; 
    http2 on;
    server_name obsidian.domain.xyz;

    ssl_certificate /etc/letsencrypt/live/timmit.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/timmit.fun/privkey.pem;

    client_max_body_size 50M;

    location / {
        proxy_pass http://wsgidav:37501;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
    }

    access_log /var/log/nginx/obsidian_access.log;
    error_log /var/log/nginx/obsidian_error.log;
}

