version: "3.9"

services:
  wsgidav:
    build:
      context: ./wsgidav
      dockerfile: Dockerfile
    container_name: wsgidav_obsidian
    restart: unless-stopped
    volumes:
      - /path/to/vault:/obsidian_vault
      - ./wsgidav/wsgidav.yaml:/app/wsgidav.yaml:ro
    expose:
      - "37501"

  nginx:
    image: nginx:latest
    container_name: wsgidav_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    ports:
      - "1664:1664"
      - "16128:16128"
    depends_on:
      - wsgidav
